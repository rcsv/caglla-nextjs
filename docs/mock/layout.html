<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="content-type" content="charset=utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="Cache-Control" content="max-age=300, private, must-revalidate">
    <title>wanderlog like layout</title>
    <link rel="stylesheet" href="src/main.css">
</head>
<body>
    <header>
        <!-- header -->
        <section id="header--top">

        </section>
        <section id="header--hamburger">
            <button 
                id="hamburger--left" 
                class="toggle-btn" 
                aria-label="toggle">☰</button>

        </section>
    </header>
    <div class="container">
        <aside id="sidebar--left">
            <!-- sidebar left max:188px, min:48px -->
            <nav id="navigation">
                <button class="toggle-btn" id="sideBarToggleBtn" aria-label="toggle">⇔</button>
            </nav>
        </aside>
        <main id="layout-main">
            <article id="viewport-width"></article>
            <footer>
                <!-- footer -->
            </footer>
        </main>
        <aside id="sidebar--right">
            <iframe name="gmap" src="https://maps.google.com/maps?q=Hawaii&t=&z=9&ie=UTF8&iwloc=&output=embed"></iframe>
        </aside>
    </div>
    <script src="src/gadget.js"></script>
</body>
</html>
